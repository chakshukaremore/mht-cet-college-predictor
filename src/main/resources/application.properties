# Application Server Port
server.port=8080

# Database Connection (MySQL)
# Auto-creates database if it doesn't exist
spring.datasource.url=jdbc:mysql://localhost:3306/mht_cet_admission?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Enable Console logging configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Boot configurations to enable reading CSV files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
